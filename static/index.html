<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Forge Emotion Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #050816;
      --bg-1: #0a0f22;
      --panel: rgba(12, 18, 38, 0.82);
      --panel-strong: rgba(8, 12, 28, 0.92);
      --border: rgba(125, 211, 252, 0.14);
      --text: #e5eefc;
      --muted: #93a4c7;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --lime: #22c55e;
      --rose: #fb7185;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      font-family: Rajdhani, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.22), transparent 32%),
        radial-gradient(circle at bottom, rgba(34, 197, 94, 0.08), transparent 28%),
        linear-gradient(135deg, var(--bg-0), var(--bg-1));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent 92%);
    }

    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .hero-card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-card {
      padding: 28px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -15% -30% auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.26), transparent 62%);
      pointer-events: none;
      filter: blur(10px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      color: #8fefff;
      background: rgba(34, 211, 238, 0.08);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-family: Orbitron, sans-serif;
      font-size: clamp(2rem, 4vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: 0.02em;
      text-shadow: 0 0 22px rgba(34, 211, 238, 0.32);
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 60ch;
      line-height: 1.5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .stat-chip {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .stat-chip .label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-chip .value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .banner {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(180deg, rgba(12, 18, 38, 0.95), rgba(8, 12, 28, 0.95));
    }

    .banner .mode {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      color: #b5f7ff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    .banner .mini {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.98rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 24px;
    }

    .panel h2 {
      margin: 0 0 14px 0;
      font-family: Orbitron, sans-serif;
      letter-spacing: 0.03em;
      font-size: 1.2rem;
    }

    .upload-area {
      border: 1px solid rgba(34, 211, 238, 0.25);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(9, 14, 33, 0.96), rgba(6, 10, 24, 0.96));
      min-height: 220px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .upload-area:hover,
    .upload-area.dragover {
      transform: translateY(-2px);
      border-color: rgba(34, 211, 238, 0.6);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.12), 0 0 36px rgba(139, 92, 246, 0.16);
    }

    .upload-area input { display: none; }

    .upload-stack {
      max-width: 360px;
    }

    .upload-headline {
      font-family: Orbitron, sans-serif;
      font-size: 1rem;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .upload-copy {
      color: var(--muted);
      line-height: 1.5;
    }

    .selected-file {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      color: #b4f7cb;
      border: 1px solid rgba(34, 197, 94, 0.24);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .profile-select {
      width: 100%;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(3, 7, 18, 0.72);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .profile-select:focus {
      border-color: rgba(34, 211, 238, 0.5);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
    }

    .upload-btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      color: #04111f;
      background: linear-gradient(135deg, #22d3ee, #8b5cf6);
      box-shadow: 0 14px 26px rgba(34, 211, 238, 0.16);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(139, 92, 246, 0.24); }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .progress-wrap {
      margin-top: 16px;
      display: none;
    }

    .progress-wrap.visible { display: block; }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.14);
      border: 1px solid rgba(34, 211, 238, 0.12);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #8b5cf6, #22c55e);
      background-size: 180% 180%;
      animation: shimmer 1.4s linear infinite;
      transition: width 0.2s ease;
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.34);
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .result-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge.success { background: rgba(34, 197, 94, 0.14); color: #b4f7cb; border: 1px solid rgba(34, 197, 94, 0.2); }
    .badge.neutral { background: rgba(34, 211, 238, 0.12); color: #b5f7ff; border: 1px solid rgba(34, 211, 238, 0.2); }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .result-card {
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.12);
      padding: 14px;
    }

    .result-card .label {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
      margin-bottom: 8px;
    }

    .result-card .value {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .result-section {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-head h3 {
      margin: 0;
      font-family: Orbitron, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    .distribution-list,
    .segment-list {
      display: grid;
      gap: 10px;
    }

    .distribution-row,
    .segment-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 13, 28, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .distribution-row .name,
    .segment-row .chunk {
      font-weight: 700;
      color: var(--text);
    }

    .distribution-bar {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.12);
    }

    .distribution-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #8b5cf6);
    }

    .segment-meta {
      color: var(--muted);
      text-align: right;
      font-size: 0.92rem;
    }

    .empty-state {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
    }

    .loading-shell {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(5, 8, 22, 0.52);
      backdrop-filter: blur(6px);
      border-radius: 24px;
    }

    .loading-shell.hidden { display: none; }

    .loading-text {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 4px solid rgba(34, 211, 238, 0.15);
      border-top-color: #22d3ee;
      border-right-color: #8b5cf6;
      animation: spin 0.85s linear infinite;
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.22);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ghost-tip {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .error-banner {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(251, 113, 133, 0.24);
      background: rgba(251, 113, 133, 0.08);
      color: #fecdd3;
      display: none;
    }

    .error-banner.visible { display: block; }

    @media (max-width: 980px) {
      .hero,
      .layout { grid-template-columns: 1fr; }
      .stats-grid,
      .result-grid { grid-template-columns: 1fr; }
      .distribution-row,
      .segment-row { grid-template-columns: 1fr; }
      .segment-meta { text-align: left; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function App() {
      const [selectedFile, setSelectedFile] = useState(null);
      const [profile, setProfile] = useState('main');
      const [progress, setProgress] = useState(0);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');
      const [dragOver, setDragOver] = useState(false);
      const fileInputRef = useRef(null);
      const progressTimerRef = useRef(null);
      const resultPanelRef = useRef(null);

      const normalizedResult = result?.data || {};
      const metadata = normalizedResult.metadata || {};
      const summary = normalizedResult.summary || {};
      const segments = Array.isArray(normalizedResult.emotion_segments) ? normalizedResult.emotion_segments : [];
      const distribution = summary.emotion_distribution || {};
      const totalSegments = segments.length;
      const dominantEmotion = useMemo(() => {
        const entries = Object.entries(distribution);
        if (!entries.length) return 'N/A';
        entries.sort((a, b) => Number(b[1]) - Number(a[1]));
        return entries[0][0];
      }, [distribution]);

      useEffect(() => {
        return () => {
          if (progressTimerRef.current) {
            clearInterval(progressTimerRef.current);
          }
        };
      }, []);

      useEffect(() => {
        if (result && resultPanelRef.current) {
          resultPanelRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [result]);

      function resetProgressTimer() {
        if (progressTimerRef.current) {
          clearInterval(progressTimerRef.current);
          progressTimerRef.current = null;
        }
      }

      function beginProgress() {
        resetProgressTimer();
        setProgress(12);
        progressTimerRef.current = setInterval(() => {
          setProgress((current) => {
            if (current >= 92) return current;
            const delta = current < 30 ? 8 : current < 60 ? 4 : 2;
            return Math.min(92, current + delta);
          });
        }, 220);
      }

      function finishProgress() {
        resetProgressTimer();
        setProgress(100);
        setTimeout(() => setProgress(0), 900);
      }

      function handleFile(file) {
        if (!file) return;
        setSelectedFile(file);
        setError('');
        setResult(null);
      }

      function onDrop(event) {
        event.preventDefault();
        setDragOver(false);
        const file = event.dataTransfer.files?.[0];
        handleFile(file);
      }

      async function runAnalysis() {
        if (!selectedFile || loading) return;

        setLoading(true);
        setError('');
        beginProgress();

        try {
          const formData = new FormData();
          formData.append('file', selectedFile);
          formData.append('profile', profile);
          formData.append('source_name', selectedFile.name);

          const response = await fetch('/api/v1/analyze/audio', {
            method: 'POST',
            body: formData,
          });

          const payload = await response.json();

          if (!response.ok || !payload.success) {
            throw new Error(payload.error || 'Analysis failed');
          }

          setResult(payload);
          setSelectedFile(null);
          if (fileInputRef.current) {
            fileInputRef.current.value = '';
          }
          finishProgress();
        } catch (err) {
          resetProgressTimer();
          setProgress(0);
          setError(err.message || 'Unexpected error');
        } finally {
          setLoading(false);
        }
      }

      const distributionEntries = Object.entries(distribution);
      const topSegments = segments.slice(0, 10);

      return (
        <div className="app-shell">
          <section className="hero">
            <div className="hero-card">
              <div className="eyebrow">Neon Forge Emotion Lab</div>
              <h1 className="title">Emotion inference with a gaming-grade interface</h1>
              <p className="subtitle">
                Upload a WAV file, run the same analysis logic you already use in <strong>main.py</strong>,
                and inspect the final emotion result in a polished dashboard.
              </p>
              <div className="stats-grid">
                <div className="stat-chip">
                  <span className="label">Mode</span>
                  <span className="value">{profile === 'main' ? 'Main' : 'Fast'}</span>
                </div>
                <div className="stat-chip">
                  <span className="label">Result</span>
                  <span className="value">{result ? dominantEmotion : 'Waiting'}</span>
                </div>
                <div className="stat-chip">
                  <span className="label">Status</span>
                  <span className="value">{loading ? 'Analyzing' : 'Ready'}</span>
                </div>
              </div>
            </div>

            <div className="hero-card banner">
              <div className="mode">Direct API inference</div>
              <div className="mini">
                Single POST to <strong>/api/v1/analyze/audio</strong> with the same inference pipeline used by the local CLI.
                No queue, no polling, no worker round-trip.
              </div>
            </div>
          </section>

          <section className="layout">
            <div className="panel">
              <h2>Audio Upload</h2>
              <div
                className={`upload-area ${dragOver ? 'dragover' : ''}`}
                onClick={() => fileInputRef.current?.click()}
                onDragOver={(event) => {
                  event.preventDefault();
                  setDragOver(true);
                }}
                onDragLeave={() => setDragOver(false)}
                onDrop={onDrop}
              >
                <div className="upload-stack">
                  <div className="upload-headline">Drop your audio file here</div>
                  <div className="upload-copy">WAV input recommended. Click or drag to load a test clip.</div>
                  {selectedFile && (
                    <div className="selected-file">
                      <span>{selectedFile.name}</span>
                    </div>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="audio/*"
                    onChange={(event) => handleFile(event.target.files?.[0])}
                  />
                </div>
              </div>

              <select
                className="profile-select"
                value={profile}
                onChange={(event) => setProfile(event.target.value)}
              >
                <option value="main">Main Workflow</option>
                <option value="fast">Fast Workflow</option>
              </select>

              <button className="upload-btn" onClick={runAnalysis} disabled={!selectedFile || loading}>
                {loading ? 'Analyzing...' : 'Run Analysis'}
              </button>

              <div className={`progress-wrap ${loading || progress > 0 ? 'visible' : ''}`}>
                <div className="progress-track">
                  <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                </div>
              </div>

              <div className={`error-banner ${error ? 'visible' : ''}`}>
                {error}
              </div>

              <div className="ghost-tip">
                The bar shows processing only. The result panel stays focused on the final output.
              </div>
            </div>

            <div className="panel" ref={resultPanelRef}>
              <div className="result-title-row">
                <h2>Final Emotion Result</h2>
                <span className={`badge ${result ? 'success' : 'neutral'}`}>
                  {result ? 'Completed' : 'Idle'}
                </span>
              </div>

              {!result && (
                <div className="empty-state">
                  <div>No inference result yet.</div>
                  <div>Upload an audio file to see the emotion output.</div>
                </div>
              )}

              {result && (
                <>
                  <div className="result-grid">
                    <div className="result-card">
                      <span className="label">Dominant Emotion</span>
                      <span className="value">{summary.overall_emotion || dominantEmotion}</span>
                    </div>
                    <div className="result-card">
                      <span className="label">Energy Level</span>
                      <span className="value">{summary.energy_level || 'N/A'}</span>
                    </div>
                    <div className="result-card">
                      <span className="label">Total Duration</span>
                      <span className="value">{Number(metadata.total_duration || 0).toFixed(2)}s</span>
                    </div>
                  </div>

                  <div className="result-grid">
                    <div className="result-card">
                      <span className="label">Segments</span>
                      <span className="value">{totalSegments}</span>
                    </div>
                    <div className="result-card">
                      <span className="label">Transitions</span>
                      <span className="value">{Array.isArray(normalizedResult.emotion_transitions) ? normalizedResult.emotion_transitions.length : 0}</span>
                    </div>
                    <div className="result-card">
                      <span className="label">Processing Mode</span>
                      <span className="value">{metadata.processing_mode || 'N/A'}</span>
                    </div>
                  </div>

                  <div className="result-section">
                    <div className="section-head">
                      <h3>Emotion Distribution</h3>
                      <span className="badge neutral">{distributionEntries.length} labels</span>
                    </div>
                    <div className="distribution-list">
                      {distributionEntries.length ? distributionEntries.map(([emotion, count]) => {
                        const value = Number(count) || 0;
                        const max = Math.max(...distributionEntries.map(([, c]) => Number(c) || 0), 1);
                        return (
                          <div className="distribution-row" key={emotion}>
                            <div className="name">{emotion}</div>
                            <div className="distribution-bar">
                              <div className="distribution-fill" style={{ width: `${(value / max) * 100}%` }}></div>
                            </div>
                            <div className="segment-meta">{value}</div>
                          </div>
                        );
                      }) : <div className="empty-state">No distribution data available.</div>}
                    </div>
                  </div>

                  <div className="result-section">
                    <div className="section-head">
                      <h3>Emotion Segments</h3>
                      <span className="badge neutral">First {Math.min(10, topSegments.length)} segments</span>
                    </div>
                    <div className="segment-list">
                      {topSegments.length ? topSegments.map((segment) => (
                        <div className="segment-row" key={segment.chunk_id}>
                          <div className="chunk">Chunk {segment.chunk_id}</div>
                          <div className="segment-meta">
                            {segment.start_time?.toFixed ? segment.start_time.toFixed(2) : Number(segment.start_time || 0).toFixed(2)}s - {segment.end_time?.toFixed ? segment.end_time.toFixed(2) : Number(segment.end_time || 0).toFixed(2)}s
                          </div>
                          <div className="segment-meta">
                            {segment.emotion} · {Number(segment.confidence || 0).toFixed(3)}
                          </div>
                        </div>
                      )) : <div className="empty-state">No segments returned.</div>}
                    </div>
                  </div>
                </>
              )}
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
